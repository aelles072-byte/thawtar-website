<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Some Moments of Us 💙🤎</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom right, #87CEEB, #5a3d2b);
    color: white;
}

/* Header */
h1 {
    text-align: center;
    margin-top: 30px;
    font-size: 40px;
    text-shadow: 2px 2px 10px black;
}

/* Subtitle */
p {
    text-align: center;
    color: #f5f5f5;
}

/* Gallery grid */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;

    padding: 30px;
}

/* Photo cards */
.card {
    background: rgba(255,255,255,0.15);
    padding: 10px;
    border-radius: 15px;

    backdrop-filter: blur(5px);

    text-align: center;
}

/* Images */
.card img {
    width: 100%;
    border-radius: 10px;
}

/* Caption */
.card p {
    margin-top: 10px;
    font-size: 14px;
}

/* Back button */
.back {
    text-align: center;
    margin: 20px;
}

.back button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;

    background: #87CEEB;
    color: black;

    cursor: pointer;
    font-size: 16px;
}

.back button:hover {
    background: #5a3d2b;
    color: white;
}

</style>

</head>

<body>

<h1>Moments of Us 💙🤎</h1>
<p>Every memory with Thaw Tar Moe</p>

<div class="gallery">

<!-- Photo 1 -->
<div class="card">
    <img src="1.jpg">
    <p>Our first photo </p>
</div>

<!-- Photo 2 -->
<div class="card">
    <img src="4.jpg">
    <p>Some snap </p>
</div>

<!-- Photo 3 -->
<div class="card">
    <img src="3.jpg">
    <p>May be some recording bite mark 💙</p>
</div>

<!-- Photo 4 -->
<div class="card">
    <img src="5.jpg">
    <p>Unforgettable moments for all of us 🤎</p>
</div>

</div>

<div class="back">
    <button onclick="location.href='home.html'">
        Back to Home 🏠
    </button>
</div>

</body>

</html>
