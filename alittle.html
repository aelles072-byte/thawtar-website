<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title> Snap & Videos 💙🤎</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom right, #87CEEB, #5a3d2b);
    color: white;
}

/* Title */
h1 {
    text-align: center;
    margin-top: 30px;
    font-size: 40px;
    text-shadow: 2px 2px 10px black;
}

/* Subtitle */
p {
    text-align: center;
}

/* Gallery layout */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    padding: 30px;
}

/* Card */
.card {
    width: 80%;
    max-width: 500px;
    background: rgba(255,255,255,0.15);
    padding: 15px;
    border-radius: 15px;
    backdrop-filter: blur(6px);
    text-align: center;
}

/* Image */
.card img {
    width: 100%;
    border-radius: 10px;
}

/* Video */
video, iframe {
    width: 100%;
    border-radius: 10px;
}

/* Back button */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;

    background: #87CEEB;
    color: black;

    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #5a3d2b;
    color: white;
}

</style>

</head>

<body>

<h1> Snap & Videos 💙🤎</h1>
<p>Every moment of Thaw Tar Moe ✨</p>

<div class="container">

<!-- Photo 1 -->
<div class="card">
    <img src="6.jpg">
    <p>ဘယ်နေနေရာ ရောက်ရောက် အမြဲ ပြုံးနေရမယ်နော်</p>
</div>

<!-- Photo 2 -->
<div class="card">
    <img src="8.jpg">
    <p>ရူပါမလန်းပေမယ့် ကြူတာကျွမ်းတယ့်ပါဝါရိန်းဂျား 💙</p>
</div>

<!-- Photo 3 -->
<div class="card">
    <img src="9.jpg">
    <p>အနောက်ပိုင်းလူမိုက် 🤎</p>
</div>

<!-- Video -->
<div class="card">

<p> နေချင်ပါဘူး လိမ်လိမ်မာမာ</p>

<video controls>
    <source src="10.mp4" type="video/mp4">
    
</video>

</div>

</div>

<!-- Back button -->
<div style="text-align:center; margin-bottom:30px;">
<button onclick="location.href='home.html'">
Back to Home 🏠
</button>
</div>

</body>

</html>
