<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Secret For You ❤️</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    background: linear-gradient(to bottom right, #87CEEB, #5a3d2b);

    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* Lock Box */
.lock-box {
    background: rgba(255,255,255,0.15);
    padding: 40px;
    border-radius: 25px;

    backdrop-filter: blur(10px);

    text-align: center;
    color: white;

    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
    font-size: 35px;
}

/* Input */
input {
    padding: 12px;
    font-size: 18px;

    border-radius: 20px;
    border: none;

    text-align: center;
}

/* Button */
button {
    margin-top: 15px;
    padding: 12px 25px;

    font-size: 18px;

    border: none;
    border-radius: 25px;

    background: #87CEEB;

    cursor: pointer;
}

#error {
    color: pink;
    margin-top: 10px;
}

</style>

</head>

<body>

<div class="lock-box">

<h1>🔒 Secret For Thaw Tar Moe</h1>

<p>Enter your birthday to unlock ❤️</p>

<input type="password"
id="password"
placeholder="DDMMYYYY">

<br>

<button onclick="checkPassword()">
Unlock
</button>

<p id="error"></p>

</div>

<script>

/* CHANGE THIS */
const correctPassword = "2942005";

function checkPassword() {

let input =
document.getElementById("password").value;

if (input === correctPassword) {

window.location.href = "home.html";

}

else {

document.getElementById("error")
.innerHTML = "Wrong birthday ❤️";

}

}

</script>

</body>

</html>
